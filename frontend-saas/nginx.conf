server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # SPA: todas las rutas (/login, /dashboard, etc.) deben servir index.html
    # para que React Router maneje el routing en el cliente.
    # PosAgil (mismo dominio): desplegar el build del POS en otra ruta, p. ej.:
    #   location /pos/ { alias /var/www/posagil/; try_files $uri $uri/ /pos/index.html; }
    # y proxy /api al backend Django (Gunicorn).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache estático para assets con hash en el nombre
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
