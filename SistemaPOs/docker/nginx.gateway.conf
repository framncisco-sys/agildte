# Gateway local: mismo origen simulado — /pos/ → PosAgil, /api/ → backend AgilDTE (Django).
#
# Uso típico (ejemplo):
#   1) Asegúrate de que posagil y el backend AgilDTE estén en la red Docker `agildte_net`.
#   2) Ajusta los nombres `posagil` y `agildte-backend` si tus contenedores/servicios se llaman distinto
#      (docker compose ps / docker network inspect agildte_net).
#   3) Ejecuta nginx con este archivo montado, p. ej.:
#        docker run --rm -p 8080:80 --network agildte_net \
#          -v /ruta/a/nginx.gateway.conf:/etc/nginx/conf.d/default.conf:ro \
#          nginx:1.27-alpine
#
# Entonces:
#   http://localhost:8080/pos/   → PosAgil (Flask en :5000)
#   http://localhost:8080/api/   → AgilDTE API (Django, puerto interno habitual 8000)

upstream posagil_app {
    # Nombre del servicio/contenedor definido en docker-compose de PosAgil
    server posagil:5000;
    keepalive 8;
}

upstream agildte_django {
    # Sustituir por el hostname real del contenedor backend de AgilDTE en la red compartida
    server agildte-backend:8000;
    keepalive 8;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 50m;

    # Redirige /pos → /pos/
    location = /pos {
        return 302 /pos/;
    }

    # PosAgil: el prefijo /pos/ se elimina al reenviar; la app Flask sigue sirviendo rutas en /
    location /pos/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /pos;
        proxy_redirect off;
        proxy_pass http://posagil_app/;
    }

    # API AgilDTE (Django REST): prefijo /api/ se mantiene
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://proyecto-backend-1:8000;
    }

    # Raíz: mensaje mínimo (opcional: proxy al frontend AgilDTE si lo tienes en otro upstream)
    location = / {
        default_type text/plain;
        return 200 'Gateway local: use /pos/ para PosAgil y /api/ para AgilDTE.\n';
    }
}
