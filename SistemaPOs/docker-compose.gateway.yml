# Gateway nginx opcional: expone :8080 con /pos/ y /api/ (mismo dominio simulado).
# Levantar después de PosAgil y de que el backend AgilDTE estén en la red `agildte_net`.
#
#   docker compose -f docker-compose.gateway.yml up -d
#
# Edita docker/nginx.gateway.conf y sustituye `agildte-backend` por el nombre real del
# contenedor/servicio Django de tu stack AgilDTE.

services:
  local-gateway:
    image: nginx:1.27-alpine
    container_name: local-gateway
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:80"
    volumes:
      - ./docker/nginx.gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - agildte_net
    restart: unless-stopped

networks:
  agildte_net:
    external: true
    name: ${AGILDTE_EXTERNAL_NETWORK:-agildte_net}
