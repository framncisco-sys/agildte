{% extends "layout.html" %}

{% block content %}
<div class="container-fluid px-4 mt-4" style="max-width: 480px;">
    <h2 class="mb-4 fw-bold text-dark"><i class="bi bi-key text-primary"></i> Cambiar contraseña</h2>
    <div class="card p-4 border-0 shadow-sm" style="border-radius: 15px;">
        {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('auth.cambiar_password') }}">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">CONTRASEÑA ACTUAL</label>
                <input type="password" name="password_actual" class="form-control bg-light border-0" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">NUEVA CONTRASEÑA</label>
                <input type="password" name="password_nueva" class="form-control bg-light border-0" required minlength="4">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">CONFIRMAR NUEVA CONTRASEÑA</label>
                <input type="password" name="password_confirmar" class="form-control bg-light border-0" required minlength="4">
            </div>
            <button type="submit" class="btn btn-primary fw-bold w-100">
                <i class="bi bi-check-lg me-1"></i> Actualizar contraseña
            </button>
        </form>
    </div>
</div>
{% endblock %}
