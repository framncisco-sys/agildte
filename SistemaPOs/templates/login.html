<!DOCTYPE html>
<!-- Programador: Oscar Amaya Romero -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Sistema de Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --az-orange: #f7931e;
            --az-blue: #4f46e5;
            --az-blue-hover: #4338ca;
            --az-purple: #7c3aed;
            --az-dark: #1e293b;
            --az-muted: #64748b;
            --az-border: #e2e8f0;
            --az-bg: #f8fafc;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--az-bg);
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }

        .login-card {
            background: #fff;
            padding: 3rem 2.5rem;
            border-radius: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 10px 20px -5px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--az-border);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.25rem;
        }
        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--az-dark);
            margin: 0 0 0.35rem;
            letter-spacing: -0.02em;
        }
        .login-header .subtitle {
            font-size: 0.9rem;
            color: var(--az-muted);
            font-weight: 500;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.35rem;
        }
        .form-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--az-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
            display: block;
        }
        .form-control {
            width: 100%;
            background: #fff;
            border: 1px solid var(--az-border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            color: var(--az-dark);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control::placeholder { color: #94a3b8; }
        .form-control:hover { border-color: #cbd5e1; }
        .form-control:focus {
            outline: none;
            border-color: var(--az-blue);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }
        /* Neutralizar autofill amarillo del navegador */
        .form-control:-webkit-autofill,
        .form-control:-webkit-autofill:hover,
        .form-control:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px #fff inset;
        }

        .btn-login {
            background: var(--az-blue);
            color: #fff;
            border: none;
            width: 100%;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.03em;
            margin-top: 0.5rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-login:hover {
            background: var(--az-blue-hover);
            color: #fff;
            transform: translateY(-1px);
        }
        .btn-login:active { transform: translateY(0); }

        .credits {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--az-border);
            text-align: center;
            font-size: 0.9rem;
            color: var(--az-muted);
            font-weight: 500;
        }
        .credits .amaya { color: var(--az-orange); font-weight: 700; }
        .credits .zamora { color: var(--az-purple); font-weight: 700; }

        .alert { border-radius: 0.75rem; }

        html[data-device="mobile"] { font-size: 15px; }
        html[data-device="tablet"] { font-size: 16px; }
        html[data-device="laptop"] { font-size: 16px; }
        html[data-device="tv"] { font-size: 18px; }
        body.device-mobile {
            padding: 1rem;
            align-items: flex-start;
            padding-top: 1.5rem;
        }
        body.device-mobile .login-card {
            padding: 1.65rem 1.25rem;
            max-width: 100%;
        }
        body.device-mobile .btn-login { min-height: 48px; font-size: 1rem; }
        body.device-tv .login-card {
            max-width: 520px;
            padding: 3.25rem 2.75rem;
        }
        body.device-tv .form-control { font-size: 1.08rem; padding: 0.85rem 1.05rem; }
        body.device-tv .btn-login { font-size: 1.08rem; padding: 1rem; min-height: 54px; }
        body.device-tv .login-header h1 { font-size: 1.65rem; }
    </style>
</head>
<body>
<script>
(function () {
    function detectDevice(w, h, ua) {
        ua = (ua || "").toLowerCase();
        if (/smart-tv|smarttv|googletv|hbbtv|appletv|tvos|roku|tizen|web0s|netcast|bravia|viera|playstation|xbox|aftm|aftb|crkey|googletv/i.test(ua)) return "tv";
        var coarse = false;
        try { coarse = window.matchMedia("(pointer: coarse)").matches; } catch (e) {}
        var looksPhone = /mobile|iphone|ipod|android.*mobile|iemobile|blackberry|opera mini/i.test(ua);
        if (w >= 1920 && h >= 1080 && coarse && !looksPhone) return "tv";
        if (w < 768) return "mobile";
        if (w < 1200) return "tablet";
        return "laptop";
    }
    function apply() {
        var w = window.innerWidth, h = window.innerHeight, d = detectDevice(w, h, navigator.userAgent);
        document.documentElement.dataset.device = d;
        document.documentElement.dataset.viewportWidth = String(w);
        var b = document.body;
        if (!b) return;
        b.classList.remove("device-mobile", "device-tablet", "device-laptop", "device-tv");
        b.classList.add("device-" + d);
    }
    document.documentElement.dataset.device = detectDevice(window.innerWidth, window.innerHeight, navigator.userAgent);
    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", apply);
    else apply();
    var t;
    window.addEventListener("resize", function () { clearTimeout(t); t = setTimeout(apply, 120); });
    window.addEventListener("orientationchange", function () { setTimeout(apply, 280); });
})();
</script>

    <div class="login-card">
        <div class="login-header">
            <h1>Sistema de Gestión</h1>
            <p class="subtitle">Bienvenido</p>
        </div>

        {% if error %}
        <div class="alert alert-danger mb-4" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label class="form-label" for="input_usuario">Usuario</label>
                <input type="text" id="input_usuario" name="usuario" class="form-control" placeholder="Ingrese su usuario" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label" for="input_password">Contraseña</label>
                <input type="password" id="input_password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-login">Entrar al sistema</button>
        </form>

        <div class="credits">
            Un proyecto de <span class="amaya">Amaya</span> & <span class="zamora">Zamora</span>
        </div>
    </div>

</body>
</html>
