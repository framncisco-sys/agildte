{# Modal global: buscar actividad económica (catálogo AgilDTE vía /api/actividades). #}
<div class="modal fade" id="modalBuscadorActividad" tabindex="-1" aria-labelledby="modalBuscadorActividadLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header py-2">
                <h5 class="modal-title fw-bold" id="modalBuscadorActividadLabel">Buscar actividad económica</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body pt-2">
                <div class="input-group input-group-sm mb-2">
                    <span class="input-group-text bg-light"><i class="bi bi-search"></i></span>
                    <input type="search" id="modal_actividad_busqueda" class="form-control" placeholder="Buscar por código o descripción..." autocomplete="off">
                </div>
                <p class="small text-muted mb-2" id="modal_actividad_fuente">
                    <i class="bi bi-cloud-check"></i> Catálogo sincronizado con AgilDTE (Ministerio de Hacienda).
                </p>
                <div id="modal_actividad_loading" class="text-center py-4 text-muted d-none">
                    <div class="spinner-border spinner-border-sm" role="status"></div> Cargando…
                </div>
                <div id="modal_actividad_error" class="alert alert-warning small d-none mb-2"></div>
                <div class="table-responsive border rounded" style="max-height: min(55vh, 420px);">
                    <table class="table table-hover table-sm align-middle mb-0">
                        <thead class="table-light sticky-top">
                            <tr>
                                <th class="ps-3" style="width:90px">Código</th>
                                <th>Descripción</th>
                                <th class="text-center pe-2" style="width:100px">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="modal_actividad_tbody"></tbody>
                    </table>
                </div>
                <p id="modal_actividad_vacio" class="small text-muted text-center py-3 mb-0 d-none">Escriba para buscar o deje vacío para ver las primeras actividades.</p>
            </div>
            <div class="modal-footer py-2">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>
