# ─────────────────────────────────────────────────────────────────────────────
# nginx-local.conf — Solo HTTP, para desarrollo LOCAL sin certificados SSL.
# Usar cuando ejecutes docker-compose.prod.yml en tu máquina.
# ─────────────────────────────────────────────────────────────────────────────
user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    upstream backend  { server backend:8000; }
    # Desarrollo: Vite (`npm run dev`) escucha en 3000, no en 80.
    # Imagen de producción (Dockerfile frontend-saas) sí usa 80 — ajusta si mezclas stacks.
    upstream frontend { server frontend:3000; }

    server {
        listen 80;
        server_name _ localhost 127.0.0.1;

        client_max_body_size 20m;

        location /static/ {
            alias /static/;
            access_log off;
            expires 30d;
        }

        location /media/ {
            alias /media/;
            access_log off;
            expires 7d;
        }

        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location /admin/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # SPA Vite: WebSocket para hot-reload
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
