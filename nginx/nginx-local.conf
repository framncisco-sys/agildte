# ─────────────────────────────────────────────────────────────────────────────
# nginx-local.conf — Solo HTTP, para desarrollo LOCAL sin certificados SSL.
# Usar cuando ejecutes docker-compose.prod.yml en tu máquina.
# ─────────────────────────────────────────────────────────────────────────────
user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    upstream backend  { server backend:8000; }
    # Imagen prod (frontend-saas/Dockerfile): nginx interno en :80.
    # Solo si usas docker-compose.yml con Vite dev, cambia a frontend:3000 o accede a localhost:3000.
    upstream frontend { server frontend:80; }
    # PosAgil (SistemaPOs): contenedor «posagil» en red agildte_net, puerto interno 5000.
    upstream posagil   { server posagil:5000; }

    server {
        listen 80;
        server_name _ localhost 127.0.0.1;

        client_max_body_size 20m;

        location /static/ {
            alias /static/;
            access_log off;
            expires 30d;
        }

        location /media/ {
            alias /media/;
            access_log off;
            expires 7d;
        }

        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Admin Django (URL en sistema_contable/urls.py); /admin/ redirige a /framncisco/ en Django.
        location /framncisco/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # PosAgil (Flask) — SSO POST /pos/auth/agildte; sin esto nginx devuelve 405 al frontend SPA.
        location = /pos {
            return 302 /pos/;
        }
        location /pos/ {
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Accept-Encoding   "";
            proxy_redirect     ~^/(.*)$ /pos/$1;
            proxy_connect_timeout 30s;
            proxy_send_timeout    180s;
            proxy_read_timeout    180s;
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;
            sub_filter 'href="/'   'href="/pos/';
            sub_filter 'src="/'    'src="/pos/';
            sub_filter 'action="/' 'action="/pos/';
            sub_filter "href='/"   "href='/pos/";
            sub_filter "src='/"    "src='/pos/";
            sub_filter "action='/" "action='/pos/";
            sub_filter 'fetch("/'  'fetch("/pos/';
            sub_filter "fetch('/"  "fetch('/pos/";
            sub_filter '/pos/pos/' '/pos/';
            proxy_pass         http://posagil/;
        }

        # SPA React (portal AgilDTE)
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
