user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    # ─── GZIP ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2
        application/font-woff
        application/font-woff2;

    # ─── RATE LIMITING ───────────────────────────────────────────────────────
    # Zona para login: máx 10 req/min por IP (protege contra fuerza bruta)
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;
    # Zona para API general: máx 120 req/min por IP
    limit_req_zone $binary_remote_addr zone=api_zone:20m   rate=120r/m;
    # Zona para admin: máx 20 req/min por IP
    limit_req_zone $binary_remote_addr zone=admin_zone:5m  rate=20r/m;

    # ─── UPSTREAMS ───────────────────────────────────────────────────────────
    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:80; }
    # PosAgil corre en otra red docker (agildte_net); nginx debe estar conectado a esa red.
    upstream posagil  { server posagil:5000; keepalive 8; }

    # ─── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name agildte.com;

        # Certbot ACME challenge (para renovaciones automáticas)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS ───────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name agildte.com;

        ssl_certificate     /etc/letsencrypt/live/agildte.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/agildte.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        # ─── Cabeceras de seguridad (comunes) ─────────────────────────────────
        # X-Frame-Options / frame-ancestors: solo en location / (SPA) y /pos/ (iframe clientes).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff                               always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        client_max_body_size 20m;

        # ─── Archivos estáticos ───────────────────────────────────────────────
        location /static/ {
            alias /static/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Archivos media: forzar descarga (evita ejecución de archivos subidos)
        location /media/ {
            alias /media/;
            access_log off;
            expires 7d;
            add_header Content-Disposition "attachment";
            add_header X-Content-Type-Options nosniff always;
        }

        # ─── Login: rate limiting estricto (fuerza bruta) ────────────────────
        location /api/auth/login/ {
            limit_req zone=login_zone burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ─── API general ─────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # 120s = igual que gunicorn --timeout 120 (DTEs lentos de MH)
            proxy_connect_timeout 120s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ─── Admin Django: URL secreta /framncisco/ ──────────────────────────
        location /framncisco/ {
            limit_req zone=admin_zone burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 120s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # /admin/ bloqueado
        location /admin/ {
            return 403;
        }

        # ─── PosAgil (Flask) ─────────────────────────────────────────────────
        # /pos/* → contenedor PosAgil; nginx reescribe el HTML para que las plantillas con
        # rutas absolutas (href="/x", src="/x", action="/x") apunten a /pos/x.
        # Importante: NO se envía X-Forwarded-Prefix para que url_for() no duplique el prefijo.
        location = /pos { return 302 /pos/; }
        location /pos/ {
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Desactivar gzip del backend para que sub_filter pueda reescribir el HTML.
            proxy_set_header   Accept-Encoding   "";
            # Reescribir Location de redirects (Flask devuelve /login → /pos/login).
            proxy_redirect     ~^/(.*)$ /pos/$1;
            proxy_connect_timeout 30s;
            proxy_send_timeout    180s;
            proxy_read_timeout    180s;

            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;
            sub_filter 'href="/'   'href="/pos/';
            sub_filter 'src="/'    'src="/pos/';
            sub_filter 'action="/' 'action="/pos/';
            sub_filter "href='/"   "href='/pos/";
            sub_filter "src='/"    "src='/pos/";
            sub_filter "action='/" "action='/pos/";
            sub_filter "fetch('/"  "fetch('/pos/";
            sub_filter 'fetch("/'  'fetch("/pos/';
            sub_filter 'fetch(`/'  'fetch(`/pos/';
            sub_filter ".open('GET', '/"  ".open('GET', '/pos/";
            sub_filter ".open('POST', '/" ".open('POST', '/pos/";
            # Salvavidas: si por error queda /pos/pos/, lo colapsa.
            sub_filter '/pos/pos/' '/pos/';

            # Permitir iframe del modal «Nuevo cliente» (misma origen /pos/ventas_pos).
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options SAMEORIGIN always;
            add_header Content-Security-Policy
                "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self';"
                always;

            proxy_pass         http://posagil/;
        }

        # ─── Frontend SPA ─────────────────────────────────────────────────────
        location / {
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Content-Security-Policy
                "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';"
                always;

            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
