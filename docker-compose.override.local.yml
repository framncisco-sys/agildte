# ─────────────────────────────────────────────────────────────────────────────
# Override para desarrollo LOCAL con docker-compose.prod.yml
# Uso: docker compose -f docker-compose.prod.yml -f docker-compose.override.local.yml up
#
# - nginx: HTTP solo (sin SSL)
# - backend: expone puerto 8000 para acceso directo
# ─────────────────────────────────────────────────────────────────────────────

services:
  nginx:
    volumes:
      - ./nginx/nginx-local.conf:/etc/nginx/nginx.conf:ro

  backend:
    ports:
      - "8000:8000"
